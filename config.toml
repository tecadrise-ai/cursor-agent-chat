# AgentChat server configuration (edit and restart server)

[server]
host = "127.0.0.1"
port = 8765
log_level = "info"

[app]
title = "Agent Chat CLI Test"

[cors]
allow_origins = ["*"]

[paths]
static_dir = "static"
chats_dir = "chats"
session_file = "session.json"
app_state_file = "_app_state.json"
agents_md_file = "AGENTS.md"
human_md_file = "HUMAN.md"
attachments_md_file = "ATTACHMENTS.md"

[defaults]
cli_prefix = "agent -p --trust --yolo --approve-mcps --model auto --resume \"{chat_id}\" --workspace \"{workspace}\" \"Read AGENTS.md and HUMAN.md first. Follow HUMAN.md first as the current task. See ATTACHMENTS.md for referenced files. \""
agents_md_default = "Read HUMAN.md first and treat it as the current task. Use AGENTS.md only as standing rules and background."
schedule = "interval:15m"

[agent]
create_chat_argv = ["agent", "create-chat"]

[scheduler]
misfire_grace_time = 43200

[timeouts]
agent_seconds = 3600
create_chat_seconds = 120
